<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Movie Reviews</title>

    <!-- Favicon -->
    <link rel="icon" href="img/logo.png">

    <!-- Bootstrap CSS -->
    <link href="vendor/bootstrap-5.3.8-dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap icons -->
    <link rel="stylesheet" href="vendor/bootstrap-icons-1.11.0/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">Movie Reviews</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a id="topMoviesLink" class="nav-link active" href="#">Top Rated Movies</a>
                </li>
                <li class="nav-item">
                    <a id="allMoviesLink" class="nav-link" href="#">All Movies</a>
                </li>
            </ul>
            <form class="d-flex ms-auto position-relative" onsubmit="return false">
                <input id="searchBox" class="form-control me-2" type="search" placeholder="Search movies..."
                       aria-label="Search">
                <ul id="suggestions" class="list-group position-absolute w-100" style="top:100%; z-index: 1000;"></ul>
            </form>
        </div>
    </div>
</nav>

<!-- Main content -->
<main class="container py-4">

    <!-- Top Rated Movies Section -->
    <section id="topMoviesSection">
        <h1 class="mb-3">Top Rated Movies</h1>
        <div id="loading" class="text-center my-4">Loading...</div>
        <div id="error" class="alert alert-danger d-none"></div>
        <div id="moviesRow" class="row g-3"></div>
    </section>

    <!-- All Movies Section -->
    <section id="allMoviesSection" class="d-none">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="mb-0">All Movies</h1>
            <div>
                <label for="sortSelect" class="me-2 fw-bold">Sort by:</label>
                <select id="sortSelect" class="form-select d-inline-block w-auto">
                    <option value="imdbRating,desc">Rating (High → Low)</option>
                    <option value="imdbRating,asc">Rating (Low -> High)</option>
                    <option value="title,asc">Title (A → Z)</option>
                    <option value="title,desc">Title (Z → A)</option>
                    <option value="releaseYear,desc">Release Year (Newest → Oldest)</option>
                    <option value="releaseYear,asc">Release Year (Oldest → Newest)</option>
                </select>
            </div>
        </div>

        <!-- Pagination -->
        <nav class="d-flex justify-content-center mt-4">
            <ul id="pagination-top" class="pagination mb-0"></ul>
        </nav>

        <div id="allMoviesList" class="list-group"></div>

        <!-- Pagination -->
        <nav class="d-flex justify-content-center mt-4">
            <ul id="pagination-bottom" class="pagination mb-0"></ul>
        </nav>
    </section>

</main>

<!-- Movie Details Modal -->
<div class="modal fade" id="movieDetailsModal" tabindex="-1" aria-labelledby="movieDetailsLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="movieDetailsLabel">Movie Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="movieDetailsContent">
                <!-- Movie details injected via JS -->
            </div>
        </div>
    </div>
</div>

<!-- JS -->
<script type="module" src="js/main.js"></script>
<script src="vendor/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
